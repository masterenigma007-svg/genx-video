<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gen X Night Watch</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
.page{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  width:100dvw;
  height:100dvh;
  overflow:hidden;
  background:#000;
}
.bg-video,
.main-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  min-width:100%;
  min-height:100%;
  background:#000;
  object-position:center center;
}
.bg-video{
  object-fit:cover;
  filter:blur(14px) brightness(.55);
  transform:scale(1.12);
  z-index:1;
}
.main-video{
  object-fit:cover;
  z-index:2;
}
.shade{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.02),rgba(0,0,0,.18));
  pointer-events:none;
  z-index:3;
}
.button-wrap{
  position:fixed;
  left:50%;
  bottom:max(3vh,24px);
  transform:translateX(-50%);
  z-index:5;
  opacity:0;
  animation:buttonFadeIn 2.8s ease 4.2s forwards;
}
.gold-button{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:118px;
  min-height:26px;
  padding:5px 12px;
  border-radius:999px;
  border:1px solid #ffe087;
  background:linear-gradient(#ffeaa0,#efb848,#8b5b0d);
  color:#130900;
  text-decoration:none;
  text-transform:uppercase;
  letter-spacing:.07em;
  font-size:10px;
  font-weight:900;
  font-family:Georgia,serif;
  box-shadow:0 4px 12px rgba(0,0,0,.62),inset 0 1px 2px rgba(255,255,255,.45);
}
@keyframes buttonFadeIn{
  from{opacity:0;transform:translateX(-50%) translateY(16px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}
@media(max-width:560px){
  .gold-button{min-width:112px;font-size:9px;min-height:25px;padding:5px 11px;}
  .button-wrap{bottom:max(28px,4vh);}
}
</style>
</head>
<body>
<main class="page">
  <video class="bg-video sync-video" autoplay muted loop playsinline preload="auto" aria-hidden="true"><source src="website_lighthouse_UNIVERSAL%20USE.mp4" type="video/mp4"></video>
  <video class="main-video sync-video" autoplay muted loop playsinline preload="auto"><source src="website_lighthouse_UNIVERSAL%20USE.mp4" type="video/mp4"></video>
  <div class="shade"></div>
  <div class="button-wrap"><a class="gold-button" href="main-menu/">Enter the Watch</a></div>
</main>
<script>
const videos=document.querySelectorAll('.sync-video');
function slowVideo(){videos.forEach(v=>{v.playbackRate=0.38;v.defaultPlaybackRate=0.38;});}
slowVideo();
videos.forEach(v=>{v.addEventListener('loadedmetadata',slowVideo);v.addEventListener('play',slowVideo);});
</script>
</body>
</html>
