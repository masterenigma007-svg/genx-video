<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gen X Night Watch</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

.page {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

.page video {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  object-position: center center;
}

.shade {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.04), rgba(0,0,0,.38));
  pointer-events: none;
}

.button-wrap {
  position: absolute;
  left: 50%;
  bottom: 4vh;
  transform: translateX(-50%);
  z-index: 5;
  opacity: 0;
  animation: buttonFadeIn 2.8s ease 3.2s forwards;
}

.gold-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 150px;
  min-height: 32px;
  padding: 7px 16px;
  border-radius: 999px;
  border: 1px solid #ffe087;
  background: linear-gradient(#ffeaa0, #efb848, #8b5b0d);
  color: #130900;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-size: 12px;
  font-weight: 900;
  font-family: Georgia, serif;
  box-shadow: 0 6px 16px rgba(0,0,0,.65), inset 0 1px 3px rgba(255,255,255,.5);
}

@keyframes buttonFadeIn {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
}

@media (max-width: 560px) {
  .gold-button {
    min-width: 145px;
    font-size: 11px;
    min-height: 30px;
    padding: 7px 14px;
  }

  .button-wrap {
    bottom: 36px;
  }
}
</style>
</head>

<body>
<main class="page">
  <video id="landingVideo" autoplay muted loop playsinline preload="auto">
    <source src="website_lighthouse_UNIVERSAL%20USE.mp4" type="video/mp4">
  </video>

  <div class="shade"></div>

  <div class="button-wrap">
    <a class="gold-button" href="/main-menu/">Enter the Watch</a>
  </div>
</main>

<script>
const video = document.getElementById('landingVideo');
function slowVideo() {
  video.playbackRate = 0.45;
  video.defaultPlaybackRate = 0.45;
}
slowVideo();
video.addEventListener('loadedmetadata', slowVideo);
video.addEventListener('play', slowVideo);
</script>
</body>
</html>
